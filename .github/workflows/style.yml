name: Code Style

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'teamshifts/locale/**'
      - 'teamshifts/static/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'teamshifts/locale/**'
      - 'teamshifts/static/**'

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync
          uv pip install ruff

      - name: Run ruff (import sorting)
        run: uv run ruff check --select I .

      - name: Run ruff (format check)
        run: uv run ruff format --check .

  flake:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync
          uv pip install flake8

      - name: Run flake8
        run: uv run flake8 .
        working-directory: .

  packaging:
    name: packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Dependencies
        run: |
          uv sync
          uv pip install twine check-manifest pretix-plugin-build setuptools build

      - name: Run check-manifest
        run: uv run check-manifest .
        working-directory: .

      - name: Build package
        run: uv run python -m build
        working-directory: .

      - name: Check package
        run: uv run twine check dist/*
        working-directory: .
